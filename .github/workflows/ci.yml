name: Firmware CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install gcc
        run: sudo apt-get install -y gcc

      - name: Build simulator
        run: make sim

      - name: Run tests
        run: make run

      - name: Validate output with Python
        run: python3 tests/validate_output.py